name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive_ext: tar.gz
            binary_name: skytab
          - os: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            binary_name: skytab
          - os: macos-14
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            binary_name: skytab

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install musl tools
        if: startsWith(matrix.target, 'x86_64-unknown-linux-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create archive
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME:-dev}"
          ARTIFACT="skytab-${VERSION}-${{ matrix.target }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.binary_name }}"
          cp README.md dist/README.md
          cp LICENSE dist/LICENSE
          tar -C dist -czf "${ARTIFACT}.tar.gz" "${{ matrix.binary_name }}" README.md LICENSE
          rm -rf dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: skytab-${{ matrix.target }}
          path: skytab-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd artifacts
          sha256sum *.tar.gz > checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            install.sh
            artifacts/*.tar.gz
            artifacts/checksums.txt
          generate_release_notes: true
